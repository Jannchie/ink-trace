<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ink Trace Playground</title>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <h1>Ink Trace</h1>
          <p>Playground for <code>@ink-trace/core</code></p>
        </div>
        <div class="header-actions">
          <span class="seed" id="seed-readout">seed: 1</span>
          <button id="reseed-button" type="button">Reseed</button>
        </div>
      </header>

      <div class="app-body">
        <aside class="controls" aria-label="Ink trace controls">
          <fieldset>
            <legend>Scene</legend>
            <label>
              <span>Preset</span>
              <select id="preset-select">
                <option value="custom">Custom</option>
                <option value="fountainPen" selected>Fountain pen</option>
                <option value="fineliner">Fineliner</option>
                <option value="brushPen">Brush pen</option>
                <option value="dipPen">Dip pen</option>
                <option value="ballpoint">Ballpoint</option>
                <option value="marker">Marker</option>
                <option value="calligraphy">Calligraphy</option>
                <option value="sketch">Sketch</option>
              </select>
            </label>
            <label>
              <span>Path</span>
              <select id="path-select">
                <option value="bezier">Bezier</option>
                <option value="line">Line</option>
                <option value="rect" selected>Rectangle</option>
                <option value="circle">Circle</option>
                <option value="triangle">Triangle</option>
                <option value="arrow">Arrow</option>
                <option value="flowchart">Flowchart</option>
                <option value="signature">Signature</option>
              </select>
            </label>
            <label>
              <span>Preview bg</span>
              <select id="background-select">
                <option value="#ffffff" selected>White</option>
                <option value="#fbfaf6">Paper</option>
                <option value="#111827">Dark</option>
                <option value="#dbeafe">Blue</option>
                <option value="#e5e7eb">Gray</option>
              </select>
            </label>
            <label>
              <span>Progress</span>
              <input id="progress" type="range" min="0" max="1" step="0.01" value="1" />
              <output id="progress-value"></output>
            </label>
          </fieldset>

          <fieldset>
            <legend>Nib</legend>
            <label><span>Width</span><input id="nib-width" type="range" min="0.1" max="16" step="0.1" /><output id="nib-width-value"></output></label>
            <label><span>Angle</span><input id="nib-angle" type="range" min="-180" max="180" step="5" /><output id="nib-angle-value"></output></label>
            <label><span>Flatness</span><input id="nib-flatness" type="range" min="0" max="1.2" step="0.05" /><output id="nib-flatness-value"></output></label>
            <label><span>Split width</span><input id="nib-split-width" type="range" min="0" max="12" step="0.1" /><output id="nib-split-width-value"></output></label>
            <label><span>Split alpha</span><input id="nib-split-alpha" type="range" min="0" max="1" step="0.05" /><output id="nib-split-alpha-value"></output></label>
          </fieldset>

          <fieldset>
            <legend>Taper</legend>
            <label><span>Variation</span><input id="taper-variation" type="range" min="0" max="2" step="0.05" /><output id="taper-variation-value"></output></label>
            <label>
              <span>Profile</span>
              <select id="taper-profile">
                <option value="uniform">Uniform</option>
                <option value="centerHeavy">Center heavy</option>
                <option value="startHeavy">Start heavy</option>
                <option value="endHeavy">End heavy</option>
                <option value="tapered">Tapered</option>
              </select>
            </label>
            <label><span>Start tip</span><input id="taper-start-tip" type="range" min="0" max="0.8" step="0.01" /><output id="taper-start-tip-value"></output></label>
            <label><span>End tip</span><input id="taper-end-tip" type="range" min="0" max="0.8" step="0.01" /><output id="taper-end-tip-value"></output></label>
            <label>
              <span>Tip style</span>
              <select id="taper-tip-style">
                <option value="sharp">Sharp</option>
                <option value="blunt">Blunt</option>
                <option value="pause">Pause</option>
                <option value="hook">Hook</option>
              </select>
            </label>
          </fieldset>

          <fieldset>
            <legend>Jitter</legend>
            <label><span>Low freq</span><input id="jitter-low" type="range" min="0" max="8" step="0.1" /><output id="jitter-low-value"></output></label>
            <label><span>High freq</span><input id="jitter-high" type="range" min="0" max="8" step="0.1" /><output id="jitter-high-value"></output></label>
            <label><span>Path deform</span><input id="jitter-deform" type="range" min="0" max="8" step="0.1" /><output id="jitter-deform-value"></output></label>
            <label><span>Edge rough</span><input id="jitter-edge" type="range" min="0" max="2" step="0.05" /><output id="jitter-edge-value"></output></label>
          </fieldset>

          <fieldset>
            <legend>Flow</legend>
            <label><span>Segmentation</span><input id="flow-segmentation" type="range" min="0" max="8" step="0.1" /><output id="flow-segmentation-value"></output></label>
            <label><span>Scale</span><input id="flow-scale" type="range" min="10" max="1200" step="10" /><output id="flow-scale-value"></output></label>
            <label><span>Min flow</span><input id="flow-min" type="range" min="0" max="1.2" step="0.05" /><output id="flow-min-value"></output></label>
            <label>
              <span>Speed</span>
              <select id="flow-speed">
                <option value="none">None</option>
                <option value="cornerSlow">Corner slow</option>
                <option value="straightFast">Straight fast</option>
              </select>
            </label>
          </fieldset>

          <fieldset>
            <legend>Dry Pen</legend>
            <label><span>Grain density</span><input id="dry-density" type="range" min="0" max="5" step="0.05" /><output id="dry-density-value"></output></label>
            <label><span>Grain length</span><input id="dry-length" type="range" min="0.1" max="8" step="0.1" /><output id="dry-length-value"></output></label>
            <label><span>Grain alpha</span><input id="dry-alpha" type="range" min="0" max="1" step="0.05" /><output id="dry-alpha-value"></output></label>
          </fieldset>

          <fieldset>
            <legend>Splatter</legend>
            <label><span>Intensity</span><input id="splatter-intensity" type="range" min="0" max="6" step="0.1" /><output id="splatter-intensity-value"></output></label>
            <label><span>Density</span><input id="splatter-density" type="range" min="0" max="8" step="0.1" /><output id="splatter-density-value"></output></label>
            <label><span>Spread</span><input id="splatter-spread" type="range" min="0.1" max="18" step="0.1" /><output id="splatter-spread-value"></output></label>
            <label><span>Size variance</span><input id="splatter-size" type="range" min="0" max="3" step="0.05" /><output id="splatter-size-value"></output></label>
            <label><span>Clustering</span><input id="splatter-cluster" type="range" min="0" max="1" step="0.05" /><output id="splatter-cluster-value"></output></label>
            <label>
              <span>Shape</span>
              <select id="splatter-shape">
                <option value="circle">Circle</option>
                <option value="ellipse">Ellipse</option>
                <option value="mixed">Mixed</option>
              </select>
            </label>
            <label><span>Corner boost</span><input id="splatter-corner" type="range" min="0" max="8" step="0.1" /><output id="splatter-corner-value"></output></label>
            <label><span>Skip ends</span><input id="splatter-skip" type="range" min="0" max="0.8" step="0.01" /><output id="splatter-skip-value"></output></label>
          </fieldset>

          <fieldset>
            <legend>Ink</legend>
            <label><span>Color</span><input id="ink-color" type="color" /><output id="ink-color-value"></output></label>
            <label><span>Flow dark</span><input id="ink-darkness" type="range" min="0" max="2" step="0.05" /><output id="ink-darkness-value"></output></label>
            <label><span>Hue jitter</span><input id="ink-hue" type="range" min="0" max="90" step="1" /><output id="ink-hue-value"></output></label>
            <label><span>Alpha</span><input id="ink-alpha" type="range" min="0.05" max="1" step="0.05" /><output id="ink-alpha-value"></output></label>
          </fieldset>
        </aside>

        <section class="content">
          <div class="stage" id="stage" aria-label="Ink trace preview">
            <canvas id="ink-canvas" width="1360" height="700"></canvas>
          </div>

          <div class="usage">
            <div class="usage-tabs" role="tablist">
              <button type="button" role="tab" data-tab="ts" aria-selected="true">TypeScript</button>
              <button type="button" role="tab" data-tab="vue" aria-selected="false">Vue</button>
              <button type="button" role="tab" data-tab="react" aria-selected="false">React</button>
              <button type="button" id="copy-button" class="copy" aria-label="Copy snippet">Copy</button>
            </div>
            <pre class="usage-code" data-tab="ts" data-active="true"><code id="snippet-ts"></code></pre>
            <pre class="usage-code" data-tab="vue"><code id="snippet-vue"></code></pre>
            <pre class="usage-code" data-tab="react"><code id="snippet-react"></code></pre>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
