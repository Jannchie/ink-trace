name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    if: github.repository == 'Jannchie/ink-trace'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Pack and publish packages
        shell: bash
        run: |
          set -euo pipefail

          pack_dir="$RUNNER_TEMP/ink-trace-packs"
          packages=(
            "@ink-trace/core"
            "@ink-trace/react"
            "@ink-trace/vue"
          )

          mkdir -p "$pack_dir"

          for package in "${packages[@]}"; do
            rm -f "$pack_dir"/*.tgz
            pnpm --filter "$package" pack --pack-destination "$pack_dir"
            npm publish "$pack_dir"/*.tgz --access public
          done
